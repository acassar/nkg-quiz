services:
  postgres:
    image: postgres:16
    container_name: nkg-quiz-postgres
    environment:
      POSTGRES_DB: nkg_quiz
      POSTGRES_USER: nkg
      POSTGRES_PASSWORD: nkgpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: nkg-quiz-redis
    ports:
      - "6379:6379"
volumes:
  pgdata:
